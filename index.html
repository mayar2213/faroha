<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Information Page</title>

<style>
body {
    margin: 0;
    padding: 20px;
    background-color: #cce7ff;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
}

.info-container {
    max-width: 600px;
    width: 100%;
    padding: 20px;
    border: 2px solid #99c2ff;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    background-color: #e6f2ff;
    text-align: center;
    color: #003366;
}

.info-container img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    margin-bottom: 20px;
    cursor: pointer;
}

.info {
    margin-bottom: 15px;
    font-size: 18px;
}

.info span {
    font-weight: bold;
}

.love-btn {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background-color: #ff4d6d;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.love-btn:hover {
    background-color: #e63956;
}
</style>
</head>

<body>

<div class="info-container">

    <img id="profile-picture" src="1.jpg" alt="Profile Picture">

    <h2>❤️ 📋 Personal Information</h2>

    <div class="info">
        <span>👤 Name:</span> Farah Khaled
    </div>

    <div class="info">
        <span>🎂 Age:</span> 22
    </div>

    <div class="info">
        <span>📅 Date of Birth:</span> 3/2/2002
    </div>

    <div class="info">
        <span>📞 Parent's Number:</span> +20 109 123 6105
    </div>

    <div class="info">
        <span>📞 Another Number:</span> +1-234-567-890
    </div>

    <div class="info">
        <span>🩺 Last Medical History:</span> non
    </div>

    <button class="love-btn" onclick="window.location.href='love.html'">
        ❤️ Open Love Page
    </button>

</div>

<audio id="profile-audio" src="06.mp3"></audio>

<script>
const profilePicture = document.getElementById('profile-picture');
const profileAudio = document.getElementById('profile-audio');

profilePicture.addEventListener('click', () => {
    profileAudio.currentTime = 120;
    profileAudio.play();
});
</script>

</body>
</html>
